<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>KalorienTracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Sidebar (Desktop) -->
    <aside id="sidebar">
      <div class="brand">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span>KalorienTracker</span>
      </div>
      <nav id="sidebar-nav"></nav>
    </aside>

    <!-- Main Content -->
    <main id="main">
      <div id="view-container"></div>
    </main>

    <!-- Bottom Nav (Mobile) -->
    <nav id="bottom-nav" aria-label="Navigation"></nav>

  </div>

  <!-- Add Meal Modal -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <div class="modal-header">
        <h2 id="modal-title">Mahlzeit hinzufügen</h2>
        <button id="modal-close" class="icon-btn" aria-label="Schließen">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-tabs" id="modal-tabs"></div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="confirm-dialog">
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn btn-ghost">Abbrechen</button>
        <button id="confirm-ok" class="btn btn-danger">Bestätigen</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
